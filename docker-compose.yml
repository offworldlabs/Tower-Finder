services:
  tower-finder:
    build: .
    ports:
      - "80:80"
      - "443:443"
      - "3012:3012"
    volumes:
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro
    env_file:
      - backend/.env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
