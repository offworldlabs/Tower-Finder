name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: pip install ../libs/retina-geolocator ../libs/retina-tracker ../libs/retina-custody ../libs/retina-simulation ../libs/retina-analytics
      - name: Lint (ruff)
        run: ruff check .
      - run: pytest tests/ -v --tb=short -m "not external"

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  dashboard-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Fetch tar1090 static assets
        run: git clone --depth 1 https://github.com/wiedehopf/tar1090.git tar1090
      - run: docker build -t tower-finder:ci .

  e2e:
    name: Playwright E2E (staging, no-live)
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests (staging, excluding @live)
        run: E2E_ENV=staging npx playwright test --grep-invert "@live"
        env:
          CI: "true"
          RADAR_API_KEY: ${{ secrets.STAGING_RADAR_API_KEY }}

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build, dashboard-build, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: staging-deploy
      cancel-in-progress: true
    steps:
      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: root
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/tower-finder
            git pull origin main
            git submodule update --init --recursive
            # Ensure tar1090 static assets are present
            [ -d tar1090/html ] || git clone --depth 1 https://github.com/wiedehopf/tar1090.git tar1090
            docker compose -f docker-compose.staging.yml down --timeout 30
            docker compose -f docker-compose.staging.yml up -d --build
            # Wait for server to become healthy (up to 90s)
            for i in $(seq 1 18); do
              if docker compose -f docker-compose.staging.yml exec -T tower-finder \
                python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')" 2>/dev/null; then
                echo "Staging server healthy after ~$((i*5))s"
                exit 0
              fi
              echo "Waiting for health check... attempt $i/18"
              sleep 5
            done
            echo "Staging health check failed after 90s"
            docker compose -f docker-compose.staging.yml logs --tail=50
            exit 1

  staging-smoke-tests:
    name: Staging smoke tests
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    steps:
      - uses: actions/checkout@v4
      - name: Wait for fleet to connect
        run: |
          echo "Waiting for fleet nodes to connect..."
          for i in $(seq 1 24); do
            COUNT=$(curl -sk https://${{ secrets.STAGING_HOST }}/api/test/dashboard \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['nodes']['active'])" 2>/dev/null) || COUNT=0
            if [ "${COUNT:-0}" -ge 1 ]; then
              echo "Fleet ready: ${COUNT} node(s) connected after ~$((i*5))s"
              break
            fi
            echo "Attempt $i/24: ${COUNT} nodes — waiting 5s..."
            sleep 5
          done
      - name: Run smoke tests against staging
        run: bash deploy/staging-smoke-test.sh

  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [staging-smoke-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - name: Deploy to production via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/tower-finder

            # Pre-deploy: save rollback image + git tag
            bash deploy/pre-deploy.sh || true

            git pull origin main
            git submodule update --init --recursive
            docker compose up -d --build

            # Wait for backend to become healthy (up to 60s)
            for i in $(seq 1 12); do
              if docker compose exec -T tower-finder python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')" 2>/dev/null; then
                echo "Deploy successful (healthy after ~$((i*5))s)"
                break
              fi
              echo "Waiting for health check... attempt $i/12"
              sleep 5
              if [ "$i" = "12" ]; then
                echo "Health check failed after 60s"
                docker compose logs --tail=50
                exit 1
              fi
            done

            # Restart fleet simulator (stop old units, start new one)
            FLEET_NUM=$(date +%s | tail -c 5)
            # Stop any running fleet units
            for unit in $(systemctl list-units --type=service --state=running --no-legend | grep '^fleet' | awk '{print $1}'); do
              echo "Stopping old fleet: $unit"
              systemctl stop "$unit" || true
            done
            # Start fresh fleet
            systemd-run --unit="fleet${FLEET_NUM}" --working-directory=/opt/tower-finder \
              python3 backend/simulation/orchestrator.py \
              --nodes 200 --mode adsb \
              --validation-url https://localhost \
              --concurrency 20 --connect-retries 999 \
              --interval 40.0 --time-scale 1.0 \
              --min-aircraft 60 --max-aircraft 100
            echo "Fleet fleet${FLEET_NUM} started"

  production-smoke-tests:
    name: Production smoke tests
    runs-on: ubuntu-latest
    needs: [deploy-production]
    steps:
      - uses: actions/checkout@v4
      - name: Wait for fleet to connect
        run: |
          echo "Waiting 60s for fleet nodes to reconnect..."
          sleep 60
          for i in $(seq 1 12); do
            COUNT=$(curl -sk https://${{ secrets.SERVER_HOST }}/api/test/dashboard \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['nodes']['active'])" 2>/dev/null) || COUNT=0
            if [ "${COUNT:-0}" -ge 10 ]; then
              echo "Fleet ready: ${COUNT} nodes connected"
              break
            fi
            echo "Attempt $i/12: ${COUNT} nodes — waiting 10s..."
            sleep 10
          done
      - name: Run production smoke tests
        env:
          BASE_URL: https://api.retina.fm
        run: |
          CURL="curl -s --connect-timeout 10 --max-time 30"
          PASS=0; FAIL=0

          check_status() {
            local name="$1" url="$2" expected="$3"
            printf "  %-40s " "$name"
            CODE=$($CURL -o /dev/null -w "%{http_code}" "$url" 2>/dev/null) || { echo "FAIL (connection)"; FAIL=$((FAIL+1)); return; }
            if [ "$CODE" = "$expected" ]; then echo "OK ($CODE)"; PASS=$((PASS+1)); else echo "FAIL ($CODE != $expected)"; FAIL=$((FAIL+1)); fi
          }

          echo "── Production Smoke Tests ──"
          check_status "GET /api/health"          "${BASE_URL}/api/health"            "200"
          check_status "GET /api/radar/nodes"     "${BASE_URL}/api/radar/nodes"       "200"
          check_status "GET /api/radar/analytics" "${BASE_URL}/api/radar/analytics"   "200"
          check_status "GET /api/test/dashboard"  "${BASE_URL}/api/test/dashboard"    "200"
          check_status "GET /api/config"          "${BASE_URL}/api/config"            "200"
          check_status "GET / (frontend)"         "https://towers.retina.fm/"         "200"
          check_status "GET /api/health (api.retina.fm)" "${BASE_URL}/api/health"     "200"

          # Check aircraft data is flowing
          AIRCRAFT=$(curl -sk "${BASE_URL}/api/test/dashboard" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['pipeline']['aircraft_on_map'])" 2>/dev/null) || AIRCRAFT=0
          printf "  %-40s " "Aircraft on map > 0"
          if [ "${AIRCRAFT:-0}" -gt 0 ]; then echo "OK ($AIRCRAFT)"; PASS=$((PASS+1)); else echo "WARN ($AIRCRAFT — fleet may still be connecting)"; fi

          echo ""
          echo "Results: $PASS passed, $FAIL failed"
          [ "$FAIL" -eq 0 ] || exit 1
