# ── Test Network Nginx Configuration ─────────────────────────────────────────
# Serves: testmap.retina.fm, testapi.retina.fm
# Deployed via docker-compose.test.yml

# Redirect all HTTP → HTTPS
server {
    listen 80;
    server_name testmap.retina.fm testapi.retina.fm _;
    return 301 https://$host$request_uri;
}

# testapi.retina.fm — API + WebSocket
server {
    listen 443 ssl;
    server_name testapi.retina.fm;

    ssl_certificate     /etc/ssl/cloudflare/cert.pem;
    ssl_certificate_key /etc/ssl/cloudflare/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # WebSocket for live aircraft updates
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # API endpoints
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# testmap.retina.fm — tar1090 live aircraft map
server {
    listen 443 ssl;
    server_name testmap.retina.fm;

    ssl_certificate     /etc/ssl/cloudflare/cert.pem;
    ssl_certificate_key /etc/ssl/cloudflare/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /app/tar1090/html;
    index index.html;

    # tar1090 data — proxied to FastAPI for live aircraft feed
    location /data/receiver.json {
        proxy_pass http://127.0.0.1:8000/api/radar/data/receiver.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "no-cache, no-store";
    }

    location /data/aircraft.json {
        proxy_pass http://127.0.0.1:8000/api/radar/data/aircraft.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "no-cache, no-store";
    }

    # Serve tar1090 static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
