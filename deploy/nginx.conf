# Redirect all HTTP → HTTPS
server {
    listen 80;
    server_name towers.retina.fm api.retina.fm map.retina.fm dash.retina.fm admin.retina.fm testapi.retina.fm testmap.retina.fm _;
    return 301 https://$host$request_uri;
}

# towers.retina.fm — frontend
server {
    listen 443 ssl;
    server_name towers.retina.fm;

    ssl_certificate     /etc/ssl/cloudflare/cert.pem;
    ssl_certificate_key /etc/ssl/cloudflare/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /app/frontend/dist;
    index index.html;

    # WebSocket → FastAPI backend
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # API requests → FastAPI backend
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Frontend SPA at /towers
    location /towers {
        alias /app/frontend/dist;
        try_files $uri $uri/ /index.html;
    }

    # Also serve at root for convenience
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the HTML entry point — ensures users get the latest JS bundle hashes
    location = /index.html {
        add_header Cache-Control "no-store, no-cache";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

