# map.retina.fm — tar1090 passive radar display
server {
    listen 443 ssl;
    server_name map.retina.fm;

    ssl_certificate     /etc/ssl/cloudflare/cert.pem;
    ssl_certificate_key /etc/ssl/cloudflare/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /app/tar1090/html;
    index index.html;

    # tar1090 data endpoints — proxied to FastAPI backend
    location /data/receiver.json {
        proxy_pass http://127.0.0.1:8000/api/radar/data/receiver.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "no-cache, no-store";
    }

    location /data/aircraft.json {
        proxy_pass http://127.0.0.1:8000/api/radar/data/aircraft.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "no-cache, no-store";
    }

    # Serve tar1090 static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

